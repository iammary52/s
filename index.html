<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#080c14" />
<title>경기주택도시공사 · 재무의사결정 지원 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --ink:#eaf1fb; --sub:#93a6c4; --lite:#6ba6de; --lite2:#8fc0ee; --mid:#3d76c2; --deep:#274f93;
  --line:rgba(120,160,210,.16);
  --sans:"Noto Sans KR",sans-serif;
  --grotesk:"Space Grotesk","Noto Sans KR",sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:radial-gradient(120% 90% at 50% 28%,#101a2c 0%,#0a111c 45%,#06090f 100%);
  color:var(--ink);font-family:var(--sans);overflow:hidden;height:100vh}
::selection{background:var(--mid);color:#fff}

.scene{position:relative;height:100vh;min-height:600px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;isolation:isolate}

/* cursor spotlight */
.spot{position:fixed;width:560px;height:560px;left:0;top:0;transform:translate(-50%,-50%);
  border-radius:50%;pointer-events:none;z-index:1;mix-blend-mode:screen;opacity:0;transition:opacity .4s;
  background:radial-gradient(circle,rgba(103,166,240,.24),rgba(103,166,240,.07) 42%,transparent 70%)}

.grid{position:absolute;inset:0;z-index:0;opacity:.4;pointer-events:none;
  background-image:linear-gradient(rgba(110,150,210,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(110,150,210,.05) 1px,transparent 1px);
  background-size:56px 56px;
  -webkit-mask-image:radial-gradient(70% 70% at 50% 42%,#000,transparent);
          mask-image:radial-gradient(70% 70% at 50% 42%,#000,transparent)}

/* ---- 3D logo plate ---- */
.stage{position:relative;z-index:3;perspective:1100px;margin-bottom:60px}
.halo{position:absolute;left:50%;top:50%;width:360px;height:360px;transform:translate(-50%,-50%);
  border-radius:50%;background:radial-gradient(circle,rgba(61,118,194,.32),transparent 66%);
  filter:blur(26px);pointer-events:none;z-index:-1}
.contact{position:absolute;left:50%;bottom:-52px;transform:translateX(-50%);
  width:250px;height:40px;border-radius:50%;pointer-events:none;
  background:radial-gradient(50% 60% at 50% 50%,rgba(3,7,14,.75),transparent 72%);filter:blur(8px)}
.plate{position:relative;width:270px;border-radius:26px;overflow:hidden;cursor:grab;
  background:#eef1f5;border:1px solid rgba(255,255,255,.5);
  box-shadow:0 40px 70px rgba(4,12,30,.6),0 8px 20px rgba(4,12,30,.5),
             inset 0 1px 0 rgba(255,255,255,.85);
  will-change:transform}
.plate.drag{cursor:grabbing}
.plate img{width:100%;display:block;-webkit-user-drag:none;user-select:none}
.plate .gloss{position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(115deg,transparent 34%,rgba(255,255,255,.55) 48%,transparent 60%);
  opacity:.0;transition:opacity .3s;mix-blend-mode:screen}
.plate:hover .gloss{opacity:.6}

/* ---- text + button ---- */
.copy{position:relative;z-index:3;text-align:center;padding:0 24px}
.title{display:flex;align-items:center;gap:16px;justify-content:center;font-weight:700;
  font-size:clamp(18px,2.4vw,26px)}
.title .bar{width:1px;height:20px;background:var(--line)}
.title .sys{color:var(--lite2);font-weight:500}
.tag{font-family:var(--grotesk);font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--sub);margin-top:12px}
.enter{margin-top:30px;display:inline-flex;align-items:center;gap:12px;font-weight:700;font-size:15px;
  color:var(--ink);text-decoration:none;padding:14px 26px;border-radius:100px;border:1px solid var(--line);
  background:linear-gradient(135deg,rgba(61,118,194,.30),rgba(39,79,147,.18));backdrop-filter:blur(8px);
  transition:transform .2s,box-shadow .2s,border-color .2s}
.enter:hover{transform:translateY(-2px);border-color:var(--lite);box-shadow:0 14px 34px rgba(39,79,147,.5)}
.enter .arw{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--lite),var(--mid));font-family:var(--grotesk);font-size:14px}
.foot{position:absolute;bottom:22px;left:0;right:0;text-align:center;z-index:3;
  font-family:var(--grotesk);font-size:11px;letter-spacing:.16em;color:rgba(147,166,196,.55)}
</style>
</head>
<body>
<div class="scene">
  <div class="grid"></div>
  <div class="spot" id="spot"></div>

  <div class="stage">
    <div class="halo"></div>
    <div class="contact"></div>
    <div class="plate" id="plate">
      <img src="gh-logo.jpeg" alt="경기주택도시공사 GH" />
      <div class="gloss"></div>
    </div>
  </div>

  <div class="copy">
    <div class="title"><span>경기주택도시공사</span><span class="bar"></span><span class="sys">재무의사결정 지원 시스템</span></div>
    <div class="tag">Financial Decision Support System</div>
    <a class="enter" href="#">입장하기 <span class="arw" aria-hidden="true">→</span></a>
  </div>

  <div class="foot">GH · GYEONGGI HOUSING &amp; URBAN DEVELOPMENT CORPORATION</div>
</div>

<script>
const RM=matchMedia("(prefers-reduced-motion: reduce)").matches;
const spot=document.getElementById("spot");
const plate=document.getElementById("plate");
const gloss=plate.querySelector(".gloss");

let tRX=0,tRY=0, cRX=0,cRY=0, dragging=false, lx=0,ly=0, t0=performance.now();

addEventListener("mousemove",e=>{
  spot.style.opacity="1"; spot.style.left=e.clientX+"px"; spot.style.top=e.clientY+"px";
  if(dragging){
    tRY+=(e.clientX-lx)*0.5; tRX=Math.max(-32,Math.min(32,tRX-(e.clientY-ly)*0.4)); lx=e.clientX; ly=e.clientY;
  }else{
    const r=plate.getBoundingClientRect();
    const px=(e.clientX-(r.left+r.width/2))/(innerWidth/2);
    const py=(e.clientY-(r.top+r.height/2))/(innerHeight/2);
    tRY=Math.max(-1,Math.min(1,px))*20;
    tRX=Math.max(-1,Math.min(1,py))*-14;
  }
});
addEventListener("mouseleave",()=>spot.style.opacity="0");
plate.addEventListener("mousedown",e=>{e.preventDefault();dragging=true;plate.classList.add("drag");lx=e.clientX;ly=e.clientY;});
addEventListener("mouseup",()=>{dragging=false;plate.classList.remove("drag");});

(function loop(now){
  const float=RM?0:Math.sin((now-t0)*0.0011)*6;
  cRX+=(tRX-cRX)*0.08; cRY+=(tRY-cRY)*0.08;
  plate.style.transform=`translateY(${float}px) rotateX(${cRX}deg) rotateY(${cRY}deg)`;
  gloss.style.transform=`translateX(${cRY*2.2}px)`;
  requestAnimationFrame(loop);
})(t0);
</script>
</body>
</html>
