<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#080c14" />
<title>경기주택도시공사 · 재무의사결정 지원 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --ink:#eaf1fb; --sub:#93a6c4; --lite:#6ba6de; --lite2:#8fc0ee; --mid:#3d76c2; --deep:#274f93;
  --line:rgba(120,160,210,.16);
  --sans:"Noto Sans KR",sans-serif; --grotesk:"Space Grotesk","Noto Sans KR",sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:radial-gradient(120% 90% at 50% 28%,#101a2c 0%,#0a111c 45%,#06090f 100%);
  color:var(--ink);font-family:var(--sans);overflow:hidden;height:100vh}
::selection{background:var(--mid);color:#fff}

.scene{position:relative;height:100vh;min-height:600px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;isolation:isolate}
.spot{position:fixed;width:560px;height:560px;left:0;top:0;transform:translate(-50%,-50%);
  border-radius:50%;pointer-events:none;z-index:1;mix-blend-mode:screen;opacity:0;transition:opacity .4s;
  background:radial-gradient(circle,rgba(103,166,240,.24),rgba(103,166,240,.07) 42%,transparent 70%)}
.grid{position:absolute;inset:0;z-index:0;opacity:.4;pointer-events:none;
  background-image:linear-gradient(rgba(110,150,210,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(110,150,210,.05) 1px,transparent 1px);
  background-size:56px 56px;
  -webkit-mask-image:radial-gradient(70% 70% at 50% 42%,#000,transparent);
          mask-image:radial-gradient(70% 70% at 50% 42%,#000,transparent)}

.stage{position:relative;z-index:3;perspective:1100px;margin-bottom:90px}
.halo{position:absolute;left:50%;top:50%;width:340px;height:340px;transform:translate(-50%,-50%);
  border-radius:50%;background:radial-gradient(circle,rgba(61,118,194,.30),transparent 66%);
  filter:blur(28px);pointer-events:none;z-index:-1}
.contact{position:absolute;left:50%;bottom:-64px;transform:translateX(-50%);
  width:240px;height:38px;border-radius:50%;pointer-events:none;
  background:radial-gradient(50% 60% at 50% 50%,rgba(3,7,14,.7),transparent 72%);filter:blur(8px)}

.rig{width:220px;height:220px;transform-style:preserve-3d;cursor:grab;animation:spin 24s linear infinite}
.rig.drag{cursor:grabbing;animation:none}
@keyframes spin{from{transform:rotateX(-30deg) rotateY(-45deg)}to{transform:rotateX(-30deg) rotateY(315deg)}}

.cf{position:absolute;width:220px;height:220px;background-size:100% 100%;background-position:center;
  border:1px solid rgba(120,160,210,.18)}
.fz{transform:translateZ(110px);background-image:url(face-left.png)}
.rz{transform:rotateY(90deg) translateZ(110px);background-image:url(face-right.png)}
.tz{transform:rotateX(90deg) translateZ(110px);background-image:url(face-top.png)}
.bz{transform:rotateY(180deg) translateZ(110px)}
.lz{transform:rotateY(-90deg) translateZ(110px)}
.dz{transform:rotateX(-90deg) translateZ(110px)}
/* hidden faces: solid brand blue with shading */
.bz,.lz,.dz{background:linear-gradient(160deg,#3f78c4,#22447e)}
.dz{background:linear-gradient(160deg,#22447e,#16305c)}
/* per-face lighting overlay */
.cf::after{content:"";position:absolute;inset:0;pointer-events:none}
.tz::after{background:linear-gradient(135deg,rgba(255,255,255,.20),transparent 60%)}
.fz::after{background:linear-gradient(160deg,rgba(255,255,255,.06),rgba(0,0,0,.18))}
.rz::after{background:linear-gradient(200deg,rgba(0,0,0,.05),rgba(0,0,0,.22))}

.copy{position:relative;z-index:3;text-align:center;padding:0 24px}
.title{display:flex;align-items:center;gap:16px;justify-content:center;font-weight:700;font-size:clamp(18px,2.4vw,26px)}
.title .bar{width:1px;height:20px;background:var(--line)}
.title .sys{color:var(--lite2);font-weight:500}
.tag{font-family:var(--grotesk);font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--sub);margin-top:12px}
.enter{margin-top:30px;display:inline-flex;align-items:center;gap:12px;font-weight:700;font-size:15px;
  color:var(--ink);text-decoration:none;padding:14px 26px;border-radius:100px;border:1px solid var(--line);
  background:linear-gradient(135deg,rgba(61,118,194,.30),rgba(39,79,147,.18));backdrop-filter:blur(8px);
  transition:transform .2s,box-shadow .2s,border-color .2s}
.enter:hover{transform:translateY(-2px);border-color:var(--lite);box-shadow:0 14px 34px rgba(39,79,147,.5)}
.enter .arw{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--lite),var(--mid));font-family:var(--grotesk);font-size:14px}
.foot{position:absolute;bottom:22px;left:0;right:0;text-align:center;z-index:3;
  font-family:var(--grotesk);font-size:11px;letter-spacing:.16em;color:rgba(147,166,196,.55)}
</style>
</head>
<body>
<div class="scene">
  <div class="grid"></div>
  <div class="spot" id="spot"></div>

  <div class="stage">
    <div class="halo"></div>
    <div class="contact"></div>
    <div class="rig" id="rig">
      <div class="cf fz"></div>
      <div class="cf rz"></div>
      <div class="cf tz"></div>
      <div class="cf bz"></div>
      <div class="cf lz"></div>
      <div class="cf dz"></div>
    </div>
  </div>

  <div class="copy">
    <div class="title"><span>경기주택도시공사</span><span class="bar"></span><span class="sys">재무의사결정 지원 시스템</span></div>
    <div class="tag">Financial Decision Support System</div>
    <a class="enter" href="#">입장하기 <span class="arw" aria-hidden="true">→</span></a>
  </div>

  <div class="foot">GH · GYEONGGI HOUSING &amp; URBAN DEVELOPMENT CORPORATION</div>
</div>

<script>
const spot=document.getElementById("spot");
addEventListener("mousemove",e=>{spot.style.opacity="1";spot.style.left=e.clientX+"px";spot.style.top=e.clientY+"px";});
addEventListener("mouseleave",()=>spot.style.opacity="0");
(function(){
  const rig=document.getElementById("rig");
  let ry=-45,rx=-30,dragging=false,lx=0,ly=0;
  function apply(){rig.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg)`;}
  rig.addEventListener("mousedown",e=>{e.preventDefault();dragging=true;rig.classList.add("drag");lx=e.clientX;ly=e.clientY;apply();});
  addEventListener("mousemove",e=>{if(!dragging)return;ry+=(e.clientX-lx)*0.5;rx=Math.max(-75,Math.min(75,rx-(e.clientY-ly)*0.4));lx=e.clientX;ly=e.clientY;apply();});
  addEventListener("mouseup",()=>{dragging=false;rig.classList.remove("drag");});
})();
</script>
</body>
</html>
